<div class="form-container">
  <h2>Créer un compte étudiant</h2>
  <form [formGroup]="form" (ngSubmit)="onSubmit()">

    <div class="form-group">
      <label>Nom</label>
      <input formControlName="nom" type="text" placeholder="Ex: Ben Ali" />
      <span class="error" *ngIf="form.get('nom')?.invalid && form.get('nom')?.touched">
        Nom requis (min 2 caractères)
      </span>
    </div>

    <div class="form-group">
      <label>Prénom</label>
      <input formControlName="prenom" type="text" placeholder="Ex: Ahmed" />
      <span class="error" *ngIf="form.get('prenom')?.invalid && form.get('prenom')?.touched">
        Prénom requis (min 2 caractères)
      </span>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input formControlName="email" type="email" placeholder="Ex: ahmed@pfe.com" />
      <span class="error" *ngIf="form.get('email')?.invalid && form.get('email')?.touched">
        Email invalide
      </span>
    </div>

    <div class="form-group">
      <label>Numéro étudiant</label>
      <input formControlName="student_number" type="text" placeholder="Ex: STU2024" />
      <span class="error" *ngIf="form.get('student_number')?.invalid && form.get('student_number')?.touched">
        Numéro étudiant requis
      </span>
    </div>

    <div class="form-group">
      <label>Département</label>
      <input formControlName="department" type="text" placeholder="Ex: Informatique" />
      <span class="error" *ngIf="form.get('department')?.invalid && form.get('department')?.touched">
        Département requis
      </span>
    </div>

    <div class="form-group">
      <label>Année d'étude</label>
      <select formControlName="year_of_study">
        <option value="">-- Choisir --</option>
        <option value="1">1ère année</option>
        <option value="2">2ème année</option>
        <option value="3">3ème année</option>
        <option value="4">4ème année</option>
        <option value="5">5ème année</option>
      </select>
      <span class="error" *ngIf="form.get('year_of_study')?.invalid && form.get('year_of_study')?.touched">
        Année requise
      </span>
    </div>

    <button type="submit" [disabled]="form.invalid || loading">
      {{ loading ? 'Création en cours...' : 'Créer le compte' }}
    </button>

    <p class="success" *ngIf="successMessage">{{ successMessage }}</p>
    <p class="error-msg" *ngIf="errorMessage">{{ errorMessage }}</p>

  </form>
</div>
