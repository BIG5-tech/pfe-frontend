<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>PFE Manager</mat-card-title>
      <mat-card-subtitle>Connectez-vous à votre espace</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

        <mat-form-field appearance="outline" style="width:100%">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email"
                 placeholder="ahmed@pfe.com">
          <mat-error *ngIf="loginForm.get('email')?.hasError('required')">
            Email requis
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" style="width:100%;margin-top:12px">
          <mat-label>Mot de passe</mat-label>
          <input matInput type="password" formControlName="password">
          <mat-error *ngIf="loginForm.get('password')?.hasError('required')">
            Mot de passe requis
          </mat-error>
        </mat-form-field>

        <div class="error-msg" *ngIf="errorMsg">{{ errorMsg }}</div>

        <button mat-raised-button color="primary"
                type="submit"
                [disabled]="loginForm.invalid || loading"
                style="width:100%;margin-top:16px">
          <span *ngIf="!loading">Se connecter</span>
          <span *ngIf="loading">Chargement...</span>
        </button>

      </form>
    </mat-card-content>

    <mat-card-footer style="padding:16px;text-align:center;font-size:13px;color:#666">
      Compte test : ahmed@pfe.com / password
    </mat-card-footer>
  </mat-card>
</div>
